name: CI Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        node-version: [22.x]
        include:
          - node-version: 20.x
            optional: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --omit=optional --ignore-scripts --no-audit --no-fund || npm install --ignore-scripts --no-audit --no-fund || npm ci
          npm rebuild better-sqlite3 2>/dev/null || true
        env:
          CXXFLAGS: "-std=gnu++20"
        timeout-minutes: 15

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Unit tests
        run: npm run test:unit
        env:
          DATABRICKS_API_KEY: test-key
          DATABRICKS_API_BASE: http://test.com
        timeout-minutes: 5

      - name: Performance tests
        run: npm run test:performance
        env:
          DATABRICKS_API_KEY: test-key
          DATABRICKS_API_BASE: http://test.com
        continue-on-error: true
        timeout-minutes: 5
