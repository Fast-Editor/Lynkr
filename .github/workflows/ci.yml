name: CI Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install
        run: pnpm install --no-optional --ignore-scripts --no-frozen-lockfile
        timeout-minutes: 5

      - name: Test
        run: |
          DATABRICKS_API_KEY=test-key DATABRICKS_API_BASE=http://test.com \
          node --test \
            test/routing.test.js \
            test/hybrid-routing-integration.test.js \
            test/web-tools.test.js \
            test/passthrough-mode.test.js \
            test/openrouter-error-resilience.test.js \
            test/format-conversion.test.js \
            test/azure-openai-config.test.js \
            test/azure-openai-format-conversion.test.js \
            test/azure-openai-routing.test.js \
            test/azure-openai-streaming.test.js \
            test/azure-openai-error-resilience.test.js \
            test/azure-openai-integration.test.js \
            test/openai-integration.test.js \
            test/toon-compression.test.js \
            test/llamacpp-integration.test.js \
            test/resilience.test.js \
            test/telemetry-routing.test.js \
            test/distill.test.js \
            test/large-payload.test.js \
            test/code-mode.test.js \
            test/prompt-cache-injection.test.js
        timeout-minutes: 5
