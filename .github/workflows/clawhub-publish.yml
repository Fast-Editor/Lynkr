name: Publish to ClawHub

on:
  push:
    paths:
      - 'skills/lynkr/**'
    branches:
      - main
  workflow_dispatch: # Manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install ClawHub CLI
        run: npm i -g clawhub

      - name: Login to ClawHub
        run: clawhub login --token ${{ secrets.CLAWHUB_AUTH }}

      - name: Extract version from SKILL.md
        id: version
        run: |
          VERSION=$(grep '^version:' skills/lynkr/SKILL.md | head -1 | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Publish skill (with retry)
        run: |
          for attempt in 1 2 3; do
            echo "Attempt $attempt..."
            clawhub publish ./skills/lynkr \
              --slug lynkr \
              --name "Lynkr AI Routing Proxy" \
              --version ${{ steps.version.outputs.version }} \
              --changelog "v${{ steps.version.outputs.version }} - Graphify, Distill, Code Mode, routing telemetry, admin reload" \
              --tags latest \
              && exit 0
            echo "Failed, waiting 60s before retry..."
            sleep 60
          done
          echo "All attempts failed"
          exit 1
