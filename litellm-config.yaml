# LiteLLM proxy config for benchmarking against Lynkr — generated from the
# credentials actually present in this repo's .env (2026-07-08).
#
# Backends configured:
#   1. Ollama local  → minimax-m2.5:cloud   (free; same backend as Lynkr SIMPLE/MEDIUM)
#   2. Moonshot      → kimi-k2.6            (real key in .env)
#   3. Azure OpenAI  → gpt-5.2-chat         (real key in .env)
# NOT configured: azure-anthropic — your setup reaches api.anthropic.com via
# Claude Code's OAuth passthrough only; there is no API key LiteLLM could use.
#
# All three share model_name "smart-router" (what the benchmark sends), so
# LiteLLM load-balances by weight/availability. Reminder of what the
# benchmark is really measuring: LiteLLM picks by health/weights, NOT by
# prompt complexity — it has no equivalent of Lynkr's tier routing.
#
# Run (keys are read from the environment — export them from .env first):
#   source ~/venvs/litellm/bin/activate
#   export $(grep -E '^(MOONSHOT_API_KEY|AZURE_OPENAI_API_KEY)=' .env | xargs)
#   litellm --port 8082 --config litellm-config.yaml
#
# Sanity check:
#   curl -s http://localhost:8082/v1/messages \
#     -H 'content-type: application/json' -H 'x-api-key: sk-1234' \
#     -H 'anthropic-version: 2023-06-01' \
#     -d '{"model":"smart-router","max_tokens":20,"messages":[{"role":"user","content":"hi"}]}'

model_list:
  # ── 1. Ollama local (weight 8 → serves the vast majority, like Lynkr's
  #       cheap tiers). minimax-m2.5:cloud is an Ollama Cloud model but is
  #       served through the local daemon, so this is a normal ollama call.
  - model_name: smart-router
    litellm_params:
      model: ollama_chat/minimax-m2.5:cloud
      api_base: http://localhost:11434
      weight: 8

  # ── 2. Moonshot Kimi (weight 1) ──
  - model_name: smart-router
    litellm_params:
      model: moonshot/kimi-k2.6
      api_base: https://api.moonshot.ai/v1
      api_key: os.environ/MOONSHOT_API_KEY
      weight: 1

  # ── 3. Azure OpenAI gpt-5.2-chat (weight 1) ──
  # Base derived from AZURE_OPENAI_ENDPOINT in .env (path stripped — LiteLLM
  # builds /openai/deployments/... itself). If your deployment only speaks
  # the newer Responses API (the .env URL carries api-version
  # 2025-04-01-preview), switch model to: azure/responses/gpt-5.2-chat
  - model_name: smart-router
    litellm_params:
      model: azure/gpt-5.2-chat
      api_base: https://visha-mddvh2sw-eastus2.cognitiveservices.azure.com
      api_key: os.environ/AZURE_OPENAI_API_KEY
      api_version: "2024-08-01-preview"
      weight: 1

litellm_settings:
  # Surface cost headers — the benchmark's LiteLLM tier-guess reads
  # x-litellm-response-cost to infer which deployment served.
  return_response_headers: true
  drop_params: true          # silently drop params a backend doesn't support
  num_retries: 1
  request_timeout: 90

router_settings:
  routing_strategy: simple-shuffle   # weight-respecting; try "latency-based-routing" too
  allowed_fails: 2
  cooldown_time: 30
